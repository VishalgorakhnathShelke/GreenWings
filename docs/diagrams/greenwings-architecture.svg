<svg width="1400" height="1040" viewBox="0 0 1400 1040" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GreenWings Application Architecture Diagram</title>
  <desc id="desc">Layered architecture diagram showing frontend, API, services, database, storage, DevOps, and admin workflows.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="1040" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8E7"/>
      <stop offset="0.48" stop-color="#F1FAEE"/>
      <stop offset="1" stop-color="#DFF3FF"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B3D2E"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48A6E8"/>
      <stop offset="1" stop-color="#1167A8"/>
    </linearGradient>
    <linearGradient id="crop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAD961"/>
      <stop offset="1" stop-color="#D08C1D"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B87845"/>
      <stop offset="1" stop-color="#67401F"/>
    </linearGradient>
    <linearGradient id="berry" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9966CC"/>
      <stop offset="1" stop-color="#4B2E83"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#063B2A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12Z" fill="#1D6B3B"/>
    </marker>
    <style>
      .title { font: 800 42px Georgia, serif; fill: #073B2A; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #52675F; }
      .lane { font: 800 16px Arial, sans-serif; fill: #073B2A; letter-spacing: 1.4px; }
      .box-title { font: 800 19px Arial, sans-serif; fill: #FFFFFF; }
      .box-text { font: 500 14px Arial, sans-serif; fill: rgba(255,255,255,0.94); }
      .dark-title { font: 800 19px Arial, sans-serif; fill: #073B2A; }
      .dark-text { font: 500 14px Arial, sans-serif; fill: #41584F; }
      .small { font: 700 12px Arial, sans-serif; fill: #66786F; letter-spacing: 0.8px; }
      .arrow { stroke: #1D6B3B; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-soft { stroke: #9FBF95; stroke-width: 2.4; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="1040" fill="url(#bg)"/>
  <circle cx="120" cy="180" r="210" fill="#B8E986" opacity="0.18"/>
  <circle cx="1230" cy="880" r="260" fill="#48A6E8" opacity="0.11"/>

  <text x="70" y="70" class="title">GreenWings Application Architecture</text>
  <text x="72" y="104" class="subtitle">A layered view of the frontend, FastAPI backend, data model, storage, scripts, and operational workflow.</text>

  <!-- Lane labels -->
  <rect x="70" y="140" width="1260" height="65" rx="22" fill="#FFFFFF" stroke="#DFD0A4"/>
  <text x="104" y="180" class="lane">CLIENT AND USER EXPERIENCE</text>

  <rect x="70" y="295" width="1260" height="65" rx="22" fill="#FFFFFF" stroke="#DFD0A4"/>
  <text x="104" y="335" class="lane">FRONTEND APPLICATION</text>

  <rect x="70" y="470" width="1260" height="65" rx="22" fill="#FFFFFF" stroke="#DFD0A4"/>
  <text x="104" y="510" class="lane">API AND BUSINESS LOGIC</text>

  <rect x="70" y="665" width="1260" height="65" rx="22" fill="#FFFFFF" stroke="#DFD0A4"/>
  <text x="104" y="705" class="lane">DATA, STORAGE, AND OPERATIONS</text>

  <!-- Client layer -->
  <g filter="url(#shadow)">
    <rect x="120" y="225" width="220" height="92" rx="22" fill="url(#leaf)"/>
    <text x="158" y="260" class="box-title">Public Visitors</text>
    <text x="158" y="288" class="box-text">Corporate website</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="405" y="225" width="220" height="92" rx="22" fill="url(#crop)"/>
    <text x="443" y="260" class="dark-title">Farmer Members</text>
    <text x="443" y="288" class="dark-text">Portal and enquiries</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="690" y="225" width="220" height="92" rx="22" fill="url(#berry)"/>
    <text x="728" y="260" class="box-title">Administrators</text>
    <text x="728" y="288" class="box-text">Content and reports</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="975" y="225" width="250" height="92" rx="22" fill="url(#sky)"/>
    <text x="1013" y="260" class="box-title">Client Preview</text>
    <text x="1013" y="288" class="box-text">Cloudflare tunnel</text>
  </g>

  <!-- Frontend layer -->
  <g filter="url(#shadow)">
    <rect x="120" y="385" width="250" height="115" rx="24" fill="#FFFFFF" stroke="#A5CFA4" stroke-width="2"/>
    <text x="154" y="424" class="dark-title">React Pages</text>
    <text x="154" y="453" class="dark-text">Home, About, Products</text>
    <text x="154" y="477" class="dark-text">Inputs, Stories, Contact</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="430" y="385" width="250" height="115" rx="24" fill="#FFFFFF" stroke="#E4C56D" stroke-width="2"/>
    <text x="464" y="424" class="dark-title">Components</text>
    <text x="464" y="453" class="dark-text">Layout, cards, admin UI</text>
    <text x="464" y="477" class="dark-text">Modals and shared UI</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="385" width="250" height="115" rx="24" fill="#FFFFFF" stroke="#91C8EC" stroke-width="2"/>
    <text x="774" y="424" class="dark-title">State Stores</text>
    <text x="774" y="453" class="dark-text">Auth, language, portal</text>
    <text x="774" y="477" class="dark-text">Products and enquiries</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1050" y="385" width="250" height="115" rx="24" fill="#FFFFFF" stroke="#C5B0F0" stroke-width="2"/>
    <text x="1084" y="424" class="dark-title">API Services</text>
    <text x="1084" y="453" class="dark-text">Typed fetch helpers</text>
    <text x="1084" y="477" class="dark-text">Language-aware calls</text>
  </g>

  <!-- Backend layer -->
  <g filter="url(#shadow)">
    <rect x="120" y="560" width="220" height="118" rx="24" fill="url(#sky)"/>
    <text x="158" y="598" class="box-title">FastAPI Routes</text>
    <text x="158" y="628" class="box-text">REST endpoints</text>
    <text x="158" y="652" class="box-text">CORS and health</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="385" y="560" width="220" height="118" rx="24" fill="url(#leaf)"/>
    <text x="423" y="598" class="box-title">Validation</text>
    <text x="423" y="628" class="box-text">Pydantic schemas</text>
    <text x="423" y="652" class="box-text">Request/response models</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="650" y="560" width="220" height="118" rx="24" fill="url(#berry)"/>
    <text x="688" y="598" class="box-title">Auth + RBAC</text>
    <text x="688" y="628" class="box-text">Admin protection</text>
    <text x="688" y="652" class="box-text">Member sessions</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="915" y="560" width="220" height="118" rx="24" fill="url(#soil)"/>
    <text x="953" y="598" class="box-title">Services</text>
    <text x="953" y="628" class="box-text">Content workflows</text>
    <text x="953" y="652" class="box-text">Business rules</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1180" y="560" width="120" height="118" rx="24" fill="url(#crop)"/>
    <text x="1212" y="598" class="dark-title">ORM</text>
    <text x="1212" y="628" class="dark-text">SQLAlchemy</text>
    <text x="1212" y="652" class="dark-text">models</text>
  </g>

  <!-- Data layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="760" width="185" height="120" rx="24" fill="#FFFFFF" stroke="#A5CFA4" stroke-width="2"/>
    <text x="132" y="797" class="dark-title">Company CMS</text>
    <text x="132" y="826" class="dark-text">Intro, vision</text>
    <text x="132" y="850" class="dark-text">Timeline, leaders</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="320" y="760" width="185" height="120" rx="24" fill="#FFFFFF" stroke="#E4C56D" stroke-width="2"/>
    <text x="352" y="797" class="dark-title">Catalogue DB</text>
    <text x="352" y="826" class="dark-text">Categories, crops</text>
    <text x="352" y="850" class="dark-text">Varieties, translations</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="540" y="760" width="185" height="120" rx="24" fill="#FFFFFF" stroke="#91C8EC" stroke-width="2"/>
    <text x="572" y="797" class="dark-title">Fertilizers</text>
    <text x="572" y="826" class="dark-text">Local/imported</text>
    <text x="572" y="850" class="dark-text">Specs and safety</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="760" y="760" width="185" height="120" rx="24" fill="#FFFFFF" stroke="#C5B0F0" stroke-width="2"/>
    <text x="792" y="797" class="dark-title">Portal Data</text>
    <text x="792" y="826" class="dark-text">Users, enquiries</text>
    <text x="792" y="850" class="dark-text">Responses, history</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="980" y="760" width="185" height="120" rx="24" fill="#FFFFFF" stroke="#D7A27A" stroke-width="2"/>
    <text x="1012" y="797" class="dark-title">R2 Storage</text>
    <text x="1012" y="826" class="dark-text">Images, documents</text>
    <text x="1012" y="850" class="dark-text">Public asset URLs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1200" y="760" width="130" height="120" rx="24" fill="#FFFFFF" stroke="#A5CFA4" stroke-width="2"/>
    <text x="1230" y="797" class="dark-title">Logs</text>
    <text x="1230" y="826" class="dark-text">Runtime</text>
    <text x="1230" y="850" class="dark-text">Audit trail</text>
  </g>

  <!-- Flow lines -->
  <line x1="230" y1="317" x2="245" y2="385" class="arrow"/>
  <line x1="515" y1="317" x2="555" y2="385" class="arrow"/>
  <line x1="800" y1="317" x2="865" y2="385" class="arrow"/>
  <line x1="1100" y1="317" x2="1175" y2="385" class="arrow"/>

  <line x1="1175" y1="500" x2="230" y2="560" class="arrow"/>
  <line x1="340" y1="620" x2="385" y2="620" class="arrow"/>
  <line x1="605" y1="620" x2="650" y2="620" class="arrow"/>
  <line x1="870" y1="620" x2="915" y2="620" class="arrow"/>
  <line x1="1135" y1="620" x2="1180" y2="620" class="arrow"/>

  <line x1="1240" y1="678" x2="412" y2="760" class="arrow-soft"/>
  <line x1="1240" y1="678" x2="632" y2="760" class="arrow-soft"/>
  <line x1="1240" y1="678" x2="1072" y2="760" class="arrow-soft"/>
  <line x1="1025" y1="678" x2="852" y2="760" class="arrow-soft"/>
  <line x1="1025" y1="678" x2="1265" y2="760" class="arrow-soft"/>

  <!-- Bottom operational strip -->
  <rect x="70" y="930" width="1260" height="58" rx="29" fill="#073B2A"/>
  <text x="108" y="966" class="box-text">Operational rule: admin edits update database records; frontend requests the selected language; missing translations safely fall back to English.</text>
  <text x="1045" y="966" class="small" fill="#DDEEDD">LOCAL DEV TO PRODUCTION READY PATH</text>
</svg>
